services:
  - type: web
    name: oxy-jen-portfolio
    env: python
    plan: free

    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app

    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4

      - key: SECRET_KEY
        generateValue: true

      - key: DB_PATH
        value: oxyjen.db

      - key: UPLOAD_DIR
        value: uploads

      - key: SMTP_USE_TLS
        value: "1"
